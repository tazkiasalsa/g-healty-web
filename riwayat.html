<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pembelian</title>
    <style>
        body { font-family: sans-serif; background-color: #f4fcf4; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #2d5a27; text-align: center;">📜 Riwayat Bulanan</h2>
        <div id="riwayatContainer"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="localStorage.removeItem('riwayatPembelian'); location.reload();" style="padding:10px; border-radius:5px; border:none; background:#555; color:white;">Reset Riwayat</button>
            <p><a href="index.html">← Kembali ke Home</a></p>
        </div>
    </div>
    <script>
        let riwayat = JSON.parse(localStorage.getItem('riwayatPembelian')) || [];
        const container = document.getElementById('riwayatContainer');
        riwayat.forEach(entry => container.innerHTML += `<div class="card"><p><strong>Tanggal:</strong> ${entry.tanggal}</p><p><strong>Total:</strong> Rp ${entry.total.toLocaleString()}</p></div>`);
    </script>
</body>
</html>
