<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Keranjang</title>
    <style>
        body { font-family: sans-serif; background-color: #f4fcf4; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .payment-option { display: block; padding: 10px; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 10px; cursor: pointer; }
        button { background: #d32f2f; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🛒 Keranjang Anda</h2>
    <div id="cartItems" class="card"></div>
    <div class="card">
        <label class="payment-option"><input type="radio" name="pay" value="DANA" checked> DANA</label>
        <label class="payment-option"><input type="radio" name="pay" value="GoPay"> GoPay</label>
        <label class="payment-option"><input type="radio" name="pay" value="ShopeePay"> ShopeePay</label>
    </div>
    <button onclick="prosesCheckout()">Bayar Sekarang</button>
    <div style="text-align: center; margin-top: 20px;"><a href="pemesanan.html">← Kembali ke Menu</a></div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cartItems');
        cart.forEach(item => {
            container.innerHTML += `<p>${item.nama} - Rp ${item.harga.toLocaleString()}</p>`;
        });

        function prosesCheckout() {
            let riwayat = JSON.parse(localStorage.getItem('riwayatMakan')) || [];
            let riwayatBaru = riwayat.concat(cart);
            localStorage.setItem('riwayatMakan', JSON.stringify(riwayatBaru));
            localStorage.removeItem('cart'); 
            alert("Pembayaran Berhasil!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
