<script>
        function prosesCheckout() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(cart.length === 0) return;
            
            // 1. Simpan ke Riwayat Bulanan
            let riwayatBulanIni = JSON.parse(localStorage.getItem('riwayatPembelian')) || [];
            riwayatBulanIni.push({
                tanggal: new Date().toLocaleDateString(),
                items: cart,
                total: cart.reduce((sum, item) => sum + item.harga, 0)
            });
            localStorage.setItem('riwayatPembelian', JSON.stringify(riwayatBulanIni));
            
            // 2. Simpan ke Riwayat Kalori Harian
            let riwayatKalori = JSON.parse(localStorage.getItem('riwayatMakan')) || [];
            localStorage.setItem('riwayatMakan', JSON.stringify(riwayatKalori.concat(cart)));
            
            localStorage.removeItem('cart'); 
            alert("Pembayaran Berhasil! Data tersimpan di riwayat bulanan.");
            window.location.href = "index.html";
        }
    </script>
