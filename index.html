<!-- Tambahkan di index.html, di bawah kotak target kalori -->
<div class="calorie-box">
    <p>Kalori Terkonsumsi: <span id="kaloriTerpakai">0</span> Kcal</p>
</div>

<script>
    // Ambil data kalori dari keranjang yang sudah di-checkout
    let kaloriMasuk = localStorage.getItem('totalKaloriHarian') || 0;
    document.getElementById('kaloriTerpakai').innerText = kaloriMasuk;
</script>
