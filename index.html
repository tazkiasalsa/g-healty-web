<!-- Ganti bagian di dalam container index.html menjadi ini: -->
<div class="container">
    <h3 id="displayNama">Halo!</h3>
    <div style="background: #e8f5e9; padding: 20px; border-radius: 15px; text-align: center;">
        <p>Target Harian Anda:</p>
        <h1 id="targetKalori">0</h1>
        <p>Kcal / hari</p>
    </div>
    <a href="pemesanan.html"><button class="btn">Lihat Semua Menu</button></a>
    <nav>
        <a href="index.html">Home</a>
        <a href="pemesanan.html">Menu</a>
        <a href="reward.html">Reward</a>
    </nav>
</div>

<script>
    let data = JSON.parse(localStorage.getItem("userData"));
    if (!data) { window.location.href = "login.html"; }

    let bmr;
    if (data.gender === 'pria') {
        bmr = (10 * data.bb) + (6.25 * data.tb) - (5 * data.usia) + 5;
    } else {
        bmr = (10 * data.bb) + (6.25 * data.tb) - (5 * data.usia) - 161;
    }

    // Hitung TDEE dan sesuaikan dengan tujuan
    let tdee = bmr * parseFloat(data.aktivitas);
    let target = Math.round(tdee + parseInt(data.tujuan));
    
    document.getElementById("displayNama").innerText = "Halo, " + data.nama + "!";
    document.getElementById("targetKalori").innerText = target;
</script>
