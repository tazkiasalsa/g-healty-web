<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>G-HEats - Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #f4fcf4; padding: 20px; max-width: 400px; margin: auto; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { background: #2d5a27; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
        nav { margin-top: 20px; padding-top: 10px; border-top: 1px solid #ddd; text-align: center; }
        nav a { margin: 0 10px; text-decoration: none; color: #2d5a27; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3 id="displayNama">Halo!</h3>
        <div style="border: 2px solid #e0e0e0; padding: 20px; text-align: center; border-radius: 15px;">
            <h2>70%</h2>
            <p>Target Harian: 1800 kcal</p>
        </div>
        <a href="pemesanan.html"><button class="btn">Lihat Semua Menu</button></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="pemesanan.html">Menu</a>
            <a href="reward.html">Reward</a>
        </nav>
    </div>
    <script>
        let nama = localStorage.getItem("username");
        if (!nama) { window.location.href = "login.html"; }
        else { document.getElementById("displayNama").innerText = "Halo, " + nama + "!"; }
    </script>
</body>
</html>
