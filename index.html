<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>G-HEats - Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #f4fcf4; padding: 20px; max-width: 400px; margin: auto; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .calorie-box { background: #e8f5e9; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #c8e6c9; }
        .btn { background: #2d5a27; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        nav { padding-top: 10px; border-top: 1px solid #eee; display: flex; justify-content: space-around; }
        nav a { text-decoration: none; color: #2d5a27; font-weight: bold; }
        .cart-widget { position: fixed; top: 20px; right: 20px; background: #2d5a27; color: white; padding: 10px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); text-decoration: none; z-index: 1000; font-size: 14px; }
        .leaf-icon { color: #2d5a27; font-size: 1.2em; }
    </style>
</head>
<body>
    <a href="keranjang.html" class="cart-widget"><span>🛒</span><span id="cartCount">0</span> | <span id="cartTotal">Rp 0</span></a>

    <div class="container">
        <h2 style="color: #2d5a27;">🌿 G-HEats</h2>
        <h3 id="displayNama">Halo!</h3>
        
        <div class="calorie-box">
            <p style="margin:0; color: #2d5a27;">Kalori Terpenuhi:</p>
            <h1 id="kaloriTerpenuhi" style="margin: 10px 0;">0 <span class="leaf-icon">🍃</span></h1>
            <p style="margin:0; font-size: 14px;">dari <span id="targetKalori">0</span> Kcal target harian</p>
        </div>
        
        <a href="pemesanan.html"><button class="btn">Lihat Semua Menu</button></a>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="pemesanan.html">🍽️ Menu</a>
            <a href="reward.html">✨ Reward</a>
        </nav>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem("userData"));
        if (!data) { window.location.href = "login.html"; }
        
        // Perhitungan Target Kalori
        let bmr = (data.gender === 'pria') ? (10 * data.bb) + (6.25 * data.tb) - (5 * data.usia) + 5 : (10 * data.bb) + (6.25 * data.tb) - (5 * data.usia) - 161;
        let tdee = bmr * parseFloat(data.aktivitas);
        let target = Math.round(tdee + parseInt(data.tujuan));
        
        document.getElementById("displayNama").innerText = "Halo, " + data.nama + "!";
        document.getElementById("targetKalori").innerText = target;

        // Fungsi Update Widget Keranjang & Kalori
        function updateDashboard() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let totalHarga = cart.reduce((sum, item) => sum + item.harga, 0);
            let totalKalori = cart.reduce((sum, item) => sum + item.kalori, 0);
            
            // Update Ikon Keranjang
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('cartTotal').innerText = "Rp " + totalHarga.toLocaleString();
            
            // Update Kalori Terpenuhi
            document.getElementById('kaloriTerpenuhi').innerHTML = totalKalori + ' <span class="leaf-icon">🍃</span>';
        }
        
        updateDashboard();
    </script>
</body>
</html>
