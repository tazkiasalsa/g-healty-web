<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-HEats - Katering Sehat</title>
    <style>
        body { font-family: sans-serif; background-color: #f4fcf4; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .progress-box { text-align: center; margin: 20px 0; padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .menu-item { background: #f9f9f9; padding: 10px; border-radius: 10px; font-size: 12px; }
        .btn { background: #2d5a27; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3>Halo, Fitri!</h3>
        <span>🔔</span>
    </div>

    <div class="progress-box">
        <h2>70%</h2>
        <p>Target Harian: 1800 kcal</p>
    </div>

    <h4>Sajian Hari Ini</h4>
    <div class="menu-grid">
        <div class="menu-item">Salmon Panggang<br><b>410 kcal</b></div>
        <div class="menu-item">Smoothie Bowl<br><b>250 kcal</b></div>
    </div>

    <h4>Rekomendasi Menu</h4>
    <button class="btn">Lihat Semua Menu</button>
</div>

</body>
</html>
