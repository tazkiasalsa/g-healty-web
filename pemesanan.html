<!-- Tambahkan ini di dalam setiap div card di pemesanan.html -->
<button onclick="tambahKeKeranjang('Geprek Oat', 25000, 450)">Pesan</button>

<script>
    function tambahKeKeranjang(nama, harga, kalori) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({nama, harga, kalori});
        localStorage.setItem('cart', JSON.stringify(cart));
        alert(nama + " ditambahkan ke keranjang!");
    }
</script>
