<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Menu G-HEats</title>
    <style>
        body { font-family: sans-serif; background-color: #f4fcf4; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .menu-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .info { flex-grow: 1; margin-left: 15px; }
        .price { font-weight: bold; color: #d32f2f; }
        button { background: #2d5a27; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #2d5a27;">Menu Utama G-HEats</h2>
    
    <div id="menuContainer"></div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="keranjang.html"><button style="background: #d32f2f; padding: 10px 20px;">Lihat Keranjang</button></a>
        <br><br>
        <a href="index.html">← Kembali ke Home</a>
    </div>

    <script>
        const daftarMenu = [
            {nama: "Ayam Geprek", kalori: 450, harga: 25000, img: "https://images.unsplash.com/photo-1626776822946-456075631293?w=200"},
            {nama: "Steak Tempe Bakar", kalori: 300, harga: 18000, img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200"},
            {nama: "Bakso Nila Kuah Bening", kalori: 250, harga: 20000, img: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=200"},
            {nama: "Edamame Rebus Garam Laut", kalori: 120, harga: 10000, img: "https://images.unsplash.com/photo-1587393855673-263625298a1a?w=200"},
            {nama: "Gado-gado Siram Kacang", kalori: 350, harga: 15000, img: "https://images.unsplash.com/photo-1605331165184-7548b8889988?w=200"},
            {nama: "Tahu Kukus Jamur", kalori: 180, harga: 12000, img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200"}
        ];

        const container = document.getElementById('menuContainer');
        daftarMenu.forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <img src="${item.img}" class="menu-img" alt="${item.nama}">
                    <div class="info">
                        <h3>${item.nama}</h3>
                        <p>${item.kalori} kcal | <span class="price">Rp ${item.harga.toLocaleString()}</span></p>
                        <button onclick="tambahKeKeranjang('${item.nama}', ${item.harga}, ${item.kalori})">Pesan</button>
                    </div>
                </div>
            `;
        });

        function tambahKeKeranjang(nama, harga, kalori) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({nama, harga, kalori});
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(nama + " ditambahkan ke keranjang!");
        }
    </script>
</body>
</html>
