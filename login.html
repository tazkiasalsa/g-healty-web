<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - G-HEats</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f4fcf4; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .container { 
            background: white; 
            width: 100%; 
            max-width: 600px; 
            padding: 25px; 
            box-sizing: border-box; 
            min-height: 100vh; 
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #2d5a27; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Data Diri G-HEats</h2>
        <input type="text" id="nama" placeholder="Nama">
        <input type="number" id="bb" placeholder="Berat Badan (kg)">
        <input type="number" id="tb" placeholder="Tinggi Badan (cm)">
        <input type="number" id="usia" placeholder="Usia">
        <select id="gender">
            <option value="pria">Pria</option>
            <option value="wanita">Wanita</option>
        </select>
        <select id="aktivitas">
            <option value="1.2">Jarang aktif</option>
            <option value="1.375">Sedikit aktif</option>
            <option value="1.55">Cukup aktif</option>
            <option value="1.725">Sangat aktif</option>
            <option value="1.9">Ekstra aktif</option>
        </select>
        <select id="tujuan">
            <option value="-500">Turunkan Berat Badan (-500 kcal)</option>
            <option value="0">Jaga Berat Badan</option>
            <option value="500">Naikkan Berat Badan (+500 kcal)</option>
        </select>
        <button onclick="simpanData()">Mulai Hitung Kalori</button>
    </div>

    <script>
        function simpanData() {
            let namaVal = document.getElementById('nama').value;
            if(!namaVal) { alert("Mohon isi nama Anda!"); return; }
            
            let data = {
                nama: namaVal,
                bb: document.getElementById('bb').value,
                tb: document.getElementById('tb').value,
                usia: document.getElementById('usia').value,
                gender: document.getElementById('gender').value,
                aktivitas: document.getElementById('aktivitas').value,
                tujuan: document.getElementById('tujuan').value
            };
            localStorage.setItem("userData", JSON.stringify(data));
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
